<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ksatria Kata Pagaska</title>
  <style>
    * { box-sizing: border-box; }
body { margin: 0; background: #0a0a0a; font-family: 'Segoe UI', sans-serif; }
#game {
  width: 100%; min-height: 100vh; position: relative;
  background: linear-gradient(180deg, #c00 0%, #c00 48%, #fff 48%, #fff 100%);
  padding: 20px 16px 160px 16px; /* bawah kasih space buat maskot */
  display: flex; justify-content: center; align-items: center;
}
#maskot {
  position: fixed; bottom: 10px; left: 10px; width: 120px;
  cursor: pointer; transition: transform 0.2s; filter: drop-shadow(0 4px 8px #0008);
  z-index: 10;
}
#maskot:active { transform: scale(0.95); }
#bubble {
  position: fixed; bottom: 140px; left: 20px; background: #fff;
  padding: 12px 16px; border-radius: 16px; max-width: 70vw;
  box-shadow: 0 4px 16px #0004; display: none; font-weight: 500;
  animation: pop 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  z-index: 11;
}
#bubble:after {
  content: ''; position: absolute; bottom: -10px; left: 30px;
  border: 10px solid transparent; border-top-color: #fff;
}
@keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
#main {
  background: #000d; backdrop-filter: blur(8px); padding: 20px; border-radius: 16px;
  color: #fff; text-align: center; display: none; border: 2px solid #fff3;
  width: 100%; max-width: 400px; z-index: 5;
}
#level {
  position: fixed; top: 16px; right: 16px; background: #fff;
  padding: 8px 16px; border-radius: 20px; font-weight: bold; color: #c00;
  z-index: 10; box-shadow: 0 2px 8px #0003;
}
input {
  padding: 14px; margin: 12px 0; border-radius: 12px; border: none; width: 100%;
  font-size: 16px; /* biar ga ke-zoom di iPhone */
}
button {
  background: #c00; color: #fff; font-weight: bold; cursor: pointer;
  padding: 14px 24px; border: none; border-radius: 12px; margin-top: 8px;
  transition: 0.2s; width: 100%; font-size: 16px;
}
button:active { background: #a00; transform: scale(0.98); }
#result { margin-top: 16px; font-weight: bold; min-height: 60px; line-height: 1.4; }
h2 { font-size: 18px; margin: 0 0 8px 0; }
  </style>
</head>
<body>
  <div id="game">
    <div id="level">LEVEL 1</div>
    <!-- Ganti src ini pake file yang udah kamu download -->
    <img id="maskot" src="/maskot.png" alt="Kak Taksaka">
    <div id="bubble"></div>

    <div id="main">
      <h2 id="mission">Kak Taksaka lagi nyiapin misi...</h2>
      <input id="answer" placeholder="Tulis yel-yel kreatif kamu di sini">
      <br><button onclick="submit()">LAPORKAN, KAK!</button>
      <p id="result"></p>
    </div>
  </div>

<script>
const bubble = document.getElementById('bubble');
const maskot = document.getElementById('maskot');
const main = document.getElementById('main');
let currentKeyword = '', level = 1;

function showBubble(text) {
  bubble.innerText = text;
  bubble.style.display = 'block';
  setTimeout(() => bubble.style.animation = 'none', 300);
}

async function fetchAPI(params) {
  const res = await fetch(`/api/game?${params}`);
  return res.json();
}

async function init() {
  const w = await fetchAPI('action=welcome');
  showBubble(w.text);

  bubble.onclick = async () => {
    bubble.style.display = 'none';
    main.style.display = 'block';
    loadMission();
  }
}

async function loadMission() {
  document.getElementById('mission').innerText = 'Kak Taksaka lagi mikir...';
  document.getElementById('answer').value = '';
  document.getElementById('result').innerText = '';
  const m = await fetchAPI('action=mission&level=' + level);
  document.getElementById('mission').innerText = m.mission;
  currentKeyword = m.keyword;
  document.getElementById('level').innerText = `LEVEL ${level}`;
}

async function submit() {
  const answer = document.getElementById('answer').value;
  if(!answer) return showBubble('Isi dulu dong yel-yelnya!');
  document.getElementById('result').innerText = 'Dinilai Kak Taksaka...';

  const j = await fetchAPI(`action=judge&answer=${encodeURIComponent(answer)}&level=${level}`);
  const hasil = j.result || 'Error kak';

  const skorMatch = hasil.match(/SKOR[:\s]*(\d+)/i);
  const skor = skorMatch? skorMatch[1] : '??';
  const komen = hasil.split('|')[1] || hasil;

  document.getElementById('result').innerHTML = `<b>SKOR: ${skor}</b><br>${komen.replace('KOMEN:', '')}`;

  if(parseInt(skor) >= 75) {
    level++;
    showBubble('Mantap! Naik ke Level ' + level + ' Merdeka!');
    setTimeout(loadMission, 2000);
  } else {
    showBubble('Coba lagi ya! Semangat 45!');
  }
}
  
maskot.onclick = () => showBubble('Siap, Ksatria! Klik gelembungku kalo mau mulai.');
document.getElementById('level').onclick = () => {
  if(confirm('Mau ulang dari Level 1?')) {
    level = 1;
    loadMission();
    showBubble('Siap! Mulai dari awal. Merdeka!');
  }
  }
init();
</script>
</body>
</html>

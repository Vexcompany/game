<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Ksatria Kata Pagaska</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; font-family: 'Segoe UI', sans-serif; }
    #game {
      width: 100%; min-height: 100dvh; position: relative;
      background: linear-gradient(180deg, #c00 0%, #c00 50%, #fff 50%, #fff 100%);
      padding: 80px 16px 160px 16px;
      display: flex; justify-content: center; align-items: flex-start;
    }
    #level {
      position: fixed; top: 16px; right: 16px; background: #fff;
      padding: 8px 16px; border-radius: 20px; font-weight: bold; color: #c00;
      z-index: 10; box-shadow: 0 2px 8px #0003; cursor: pointer;
    }
    #maskot {
      position: fixed; bottom: 10px; left: 10px; width: 110px;
      cursor: pointer; transition: transform 0.2s; filter: drop-shadow(0 4px 8px #0008);
      z-index: 10;
    }
    #maskot:active { transform: scale(0.95); }
    #bubble {
      position: fixed; bottom: 130px; left: 20px; background: #fff;
      padding: 12px 16px; border-radius: 16px; max-width: 65vw;
      box-shadow: 0 4px 16px #0004; display: none; font-weight: 500;
      animation: pop 0.3s; z-index: 11; font-size: 14px;
    }
    #bubble:after {
      content: ''; position: absolute; bottom: -10px; left: 30px;
      border: 10px solid transparent; border-top-color: #fff;
    }
    @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
    #main {
      background: #000d; backdrop-filter: blur(8px); padding: 20px; border-radius: 16px;
      color: #fff; text-align: center; display: none; border: 2px solid #fff3;
      width: 100%; max-width: 400px; z-index: 5;
    }
    input {
      padding: 14px; margin: 12px 0; border-radius: 12px; border: none; width: 100%;
      font-size: 16px;
    }
    button {
      background: #c00; color: #fff; font-weight: bold; cursor: pointer;
      padding: 14px 24px; border: none; border-radius: 12px; margin-top: 8px;
      transition: 0.2s; width: 100%; font-size: 16px;
    }
    button:active { background: #a00; transform: scale(0.98); }
    button:disabled { background: #666; }
    #result { margin-top: 16px; font-weight: bold; min-height: 60px; line-height: 1.4; font-size: 14px; }
    h2 { font-size: 18px; margin: 0 0 8px 0; min-height: 50px; }
  </style>
</head>
<body>
  <div id="game">
    <div id="level">LEVEL 1</div>
    <img id="maskot" src="/maskot.png" alt="Kak Taksaka">
    <div id="bubble"></div>

    <div id="main">
      <h2 id="mission">Kak Taksaka lagi nyiapin misi...</h2>
      <input id="answer" placeholder="Tulis yel-yel kreatif kamu">
      <br><button id="btnLapor" onclick="submit()">LAPORKAN, KAK!</button>
      <p id="result"></p>
    </div>
  </div>

<script>
const bubble = document.getElementById('bubble');
const maskot = document.getElementById('maskot');
const main = document.getElementById('main');
const btnLapor = document.getElementById('btnLapor');
let currentKeyword = '', level = 1;
let welcomeStep = 0; // 0=belum, 1=udah sapa1, 2=udah sapa2

function showBubble(text) {
  bubble.innerText = text;
  bubble.style.display = 'block';
  bubble.style.animation = 'pop 0.3s';
  setTimeout(() => bubble.style.animation = 'none', 300);
}

async function fetchAPI(params) {
  try {
    const res = await fetch(`/api/game?${params}`);
    return await res.json();
  } catch {
    return { error: "Gagal konek server" }
  }
}

async function init() {
  maskot.onclick = async () => {
    if (welcomeStep === 0) {
      // TAHAP 1: Sapaan pertama
      const w1 = await fetchAPI('action=welcome1');
      if(w1.error) return showBubble('Kak Taksaka error: ' + w1.error);
      showBubble(w1.text);
      welcomeStep = 1;
    }
  }

  bubble.onclick = async () => {
    if (welcomeStep === 1) {
      // TAHAP 2: Lanjut sapaan kedua
      const w2 = await fetchAPI('action=welcome2');
      if(w2.error) return showBubble('Kak Taksaka error: ' + w2.error);
      showBubble(w2.text);
      welcomeStep = 2;
    } else if (welcomeStep === 2) {
      // TAHAP 3: Masuk game
      bubble.style.display = 'none';
      main.style.display = 'block';
      loadMission();
      welcomeStep = 3;
    }
  }
}

async function loadMission() {
  document.getElementById('mission').innerText = 'Kak Taksaka lagi mikir...';
  document.getElementById('answer').value = '';
  document.getElementById('result').innerText = '';
  btnLapor.disabled = true;

  const m = await fetchAPI('action=mission&level=' + level);
  if(m.error) {
    document.getElementById('mission').innerText = 'Error: ' + m.error;
    return;
  }
  document.getElementById('mission').innerText = m.mission;
  currentKeyword = m.keyword;
  document.getElementById('level').innerText = `LEVEL ${level}`;
  btnLapor.disabled = false;
}

async function submit() {
  const answer = document.getElementById('answer').value.trim();
  if(!answer) return showBubble('Isi dulu dong yel-yelnya!');

  btnLapor.disabled = true;
  document.getElementById('result').innerText = 'Dinilai Kak Taksaka...';

  const j = await fetchAPI(`action=judge&answer=${encodeURIComponent(answer)}&level=${level}`);
  const hasil = j.result || 'Error: Gagal nilai';

  let skor = 0;
  let komen = hasil;
  const skorMatch = hasil.match(/SKOR\s*:\s*(\d+)/i);
  if(skorMatch) {
    skor = parseInt(skorMatch[1]);
    komen = hasil.split(/KOMEN\s*:\s*/i)[1] || 'Kerja bagus!';
  } else {
    const angkaMatch = hasil.match(/\d+/);
    if(angkaMatch) skor = parseInt(angkaMatch[0]);
    komen = hasil.replace(/skor\s*:?\s*\d+/i, '').trim();
  }

  document.getElementById('result').innerHTML = `<b>SKOR: ${skor}</b><br>${komen}`;

  if(skor >= 75) {
    level++;
    showBubble(`Mantap! Skor ${skor}. Naik Level ${level}! Merdeka!`);
    setTimeout(loadMission, 2500);
  } else {
    showBubble(`Skor ${skor}. Coba lagi ya! Semangat 45!`);
    btnLapor.disabled = false;
  }
}

document.getElementById('level').onclick = () => {
  if(confirm('Mau ulang dari Level 1?')) {
    level = 1;
    loadMission();
    showBubble('Siap! Mulai dari awal. Merdeka!');
  }
}

init();
</script>
</body>
</html>
